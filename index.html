<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Id Muzix</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">Id Muz<span>ix</span><span class="logo-dot"></span></div>

  <nav class="sidebar-nav">
    <a class="nav-item active" data-view="home" onclick="showView('home')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      Beranda
    </a>
    <a class="nav-item" data-view="search" onclick="showView('search')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      Cari
    </a>
  </nav>

  <div class="sidebar-section-label">Diputar Terakhir</div>
  <div class="sidebar-history" id="sidebarHistory"></div>
</aside>

<!-- Main -->
<main class="main" id="mainContent">

  <!-- Top bar -->
  <div class="topbar">
    <button class="hamburger" id="hamburger" onclick="toggleSidebar()">
      <span></span><span></span><span></span>
    </button>
    <div class="search-wrap" id="searchWrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Cari lagu, artis, album..." autocomplete="off" />
      <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
    </div>
  </div>

  <!-- VIEW: HOME ─────────────────────────────────────────────────────── -->
  <div class="view" id="viewHome">

    <!-- Hero greeting -->
    <div class="hero-section">
      <div class="hero-text">
        <h1 class="hero-title">Selamat <span id="greetingTime"></span> 👋</h1>
        <p class="hero-sub">Temukan musik favoritmu hari ini</p>
      </div>
    </div>

    <!-- Trending section -->
    <div class="section-header">
      <h2 class="section-title">🔥 Trending Indonesia</h2>
      <span class="section-badge" id="trendingBadge">Live</span>
    </div>

    <!-- Skeleton trending -->
    <div class="trending-skeleton" id="trendingSkeleton">
      <div class="trend-card-skeleton" style="--d:0"></div>
      <div class="trend-card-skeleton" style="--d:1"></div>
      <div class="trend-card-skeleton" style="--d:2"></div>
      <div class="trend-card-skeleton" style="--d:3"></div>
      <div class="trend-card-skeleton" style="--d:4"></div>
      <div class="trend-card-skeleton" style="--d:5"></div>
    </div>

    <!-- Top 3 hero cards -->
    <div class="trending-heroes" id="trendingHeroes"></div>

    <!-- Trending list 4-20 -->
    <div class="trending-list" id="trendingList"></div>

  </div>

  <!-- VIEW: SEARCH ───────────────────────────────────────────────────── -->
  <div class="view hidden" id="viewSearch">

    <!-- History chips -->
    <div id="historySection" class="history-section">
      <div class="section-label">Pencarian terakhir</div>
      <div class="history-chips" id="historyChips"></div>
    </div>

    <!-- Skeleton loader -->
    <div id="skeletonLoader" class="skeleton-card hidden">
      <div class="sk-thumb"></div>
      <div class="sk-lines">
        <div class="sk-line w70"></div>
        <div class="sk-line w40"></div>
        <div class="sk-line w90 h8"></div>
        <div class="sk-line w100 h44"></div>
      </div>
    </div>

    <!-- Error state -->
    <div class="state-msg hidden" id="errorMsg">
      <div class="emoji">😔</div>
      <strong>Lagu gak ditemukan</strong>
      Coba keyword yang lebih spesifik
    </div>

    <!-- Result card -->
    <div class="result-card hidden" id="resultCard">
      <div id="thumbWrap" class="thumb-wrap">
        <div class="thumb-placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M9 18V5l12-2v13M9 18c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm12 0c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2z"/>
          </svg>
        </div>
      </div>

      <div class="card-body">
        <div class="card-info">
          <div class="card-title" id="cardTitle">—</div>
          <div class="card-artist" id="cardArtist">—</div>
          <div class="card-meta-row">
            <span class="card-meta" id="cardMeta">—</span>
            <span class="source-badge" id="sourceBadge"></span>
          </div>
        </div>

        <div class="player">
          <div class="progress-wrap">
            <div class="progress-bar" id="progressBar">
              <div class="progress-fill" id="progressFill"></div>
              <div class="progress-thumb" id="progressThumb"></div>
            </div>
            <div class="time-row">
              <span id="timeCurrent">0:00</span>
              <span id="timeDuration">0:00</span>
            </div>
          </div>

          <div class="controls">
            <button class="ctrl-btn" id="shuffleBtn" title="Shuffle / Next Related" onclick="nextRelated()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M16 3h5v5M4 20 21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/>
              </svg>
            </button>
            <button class="ctrl-btn" id="muteBtn" title="Mute">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
              </svg>
            </button>
            <button class="play-btn" id="playBtn" disabled>
              <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            </button>
            <button class="ctrl-btn" id="loopBtn" title="Loop">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                <path d="M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
              </svg>
            </button>
            <a class="ctrl-btn" id="downloadBtn" href="#" download title="Download">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- Related songs -->
    <div class="related-section hidden" id="relatedSection">
      <div class="section-label">Lagu terkait</div>
      <div class="related-list" id="relatedList"></div>
    </div>

  </div>

</main>

<!-- Now Playing Bar -->
<div class="now-playing-bar" id="nowPlayingBar">
  <div class="np-left">
    <img class="np-thumb" id="npThumb" src="" alt="" />
    <div class="np-info">
      <div class="np-title" id="npTitle">—</div>
      <div class="np-artist" id="npArtist">—</div>
    </div>
  </div>

  <div class="np-center">
    <button class="np-ctrl" id="npShuffleBtn" onclick="nextRelated()" title="Next Related">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M16 3h5v5M4 20 21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/>
      </svg>
    </button>
    <button class="np-play-btn" id="npPlayBtn">
      <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    </button>
    <button class="np-ctrl" id="npLoopBtn" onclick="toggleLoopNp()" title="Loop">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
        <path d="M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
      </svg>
    </button>
  </div>

  <div class="np-right">
    <div class="np-progress-wrap">
      <div class="np-progress-bar" id="npProgressBar">
        <div class="np-progress-fill" id="npProgressFill"></div>
      </div>
      <div class="np-times">
        <span id="npTimeCurrent">0:00</span>
        <span id="npTimeDuration">0:00</span>
      </div>
    </div>
    <div class="np-anim">
      <span></span><span></span><span></span><span></span>
    </div>
  </div>
</div>

<div class="toast" id="toastEl"></div>
<audio id="audioEl" preload="none"></audio>
<audio id="preloadAudio" preload="auto" style="display:none"></audio>
<script src="js/app.js"></script>
</body>
</html>
