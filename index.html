<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Id Muzix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: rgba(255,255,255,0.07);
      --accent: #c8f542;
      --accent2: #7c3aed;
      --text: #f0f0f8;
      --muted: rgba(240,240,248,0.4);
      --radius: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background ambient */
    body::before {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
      top: -200px; right: -200px;
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(200,245,66,0.07) 0%, transparent 70%);
      bottom: -100px; left: -100px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 20px 120px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    header {
      padding: 48px 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--accent); }
    .logo-dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      display: inline-block;
      margin-left: 4px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* Search */
    .search-wrap {
      position: relative;
      margin-bottom: 32px;
    }
    .search-wrap input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 56px 16px 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-wrap input::placeholder { color: var(--muted); }
    .search-wrap input:focus {
      border-color: rgba(200,245,66,0.4);
      box-shadow: 0 0 0 3px rgba(200,245,66,0.08);
    }
    .search-btn {
      position: absolute;
      right: 8px; top: 50%;
      transform: translateY(-50%);
      background: var(--accent);
      border: none;
      width: 40px; height: 40px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, opacity 0.15s;
    }
    .search-btn:hover { opacity: 0.85; transform: translateY(-50%) scale(0.97); }
    .search-btn svg { width: 18px; height: 18px; }
    .search-btn.loading { opacity: 0.6; pointer-events: none; }
    .search-btn.loading svg { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Result card */
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 24px;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.3s, transform 0.3s;
    }
    .result-card.show { opacity: 1; transform: translateY(0); }

    .card-thumb {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      display: block;
      background: var(--surface2);
    }
    .thumb-placeholder {
      width: 100%;
      aspect-ratio: 1/1;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .thumb-placeholder svg { opacity: 0.2; width: 48px; height: 48px; }

    .card-info {
      padding: 20px 20px 0;
    }
    .card-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 18px;
      line-height: 1.3;
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-meta {
      font-size: 13px;
      color: var(--muted);
    }

    /* Player */
    .player {
      padding: 20px;
    }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 8px;
    }
    .progress-bar {
      width: 100%;
      height: 4px;
      background: var(--surface2);
      border-radius: 99px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      width: 0%;
      transition: width 0.1s linear;
      position: relative;
    }
    .progress-bar:hover .progress-fill::after {
      content: '';
      position: absolute;
      right: 0; top: 50%;
      transform: translateY(-50%);
      width: 12px; height: 12px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 0 3px rgba(200,245,66,0.3);
    }
    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 16px;
    }
    .ctrl-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s, background 0.2s;
    }
    .ctrl-btn:hover { color: var(--text); background: var(--surface2); }
    .ctrl-btn svg { width: 20px; height: 20px; }

    .play-btn {
      width: 52px; height: 52px;
      background: var(--accent);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, opacity 0.15s;
      flex-shrink: 0;
    }
    .play-btn:hover { transform: scale(0.95); }
    .play-btn:disabled { opacity: 0.4; pointer-events: none; }
    .play-btn svg { width: 22px; height: 22px; color: #0a0a0f; }

    /* Download button */
    .download-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 13px 16px;
      cursor: pointer;
      margin: 16px 20px 20px;
      width: calc(100% - 40px);
      transition: background 0.2s, border-color 0.2s;
      text-decoration: none;
    }
    .download-btn:hover {
      background: rgba(200,245,66,0.08);
      border-color: rgba(200,245,66,0.3);
      color: var(--accent);
    }
    .download-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* Error / Empty state */
    .state-msg {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
      font-size: 14px;
      display: none;
    }
    .state-msg.show { display: block; }
    .state-msg .emoji { font-size: 32px; margin-bottom: 12px; }
    .state-msg strong { display: block; color: var(--text); font-size: 16px; margin-bottom: 6px; }

    /* History */
    .history-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .history-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 32px;
    }
    .chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .chip:hover { border-color: rgba(200,245,66,0.4); color: var(--accent); }

    /* Now playing bar (bottom) */
    .now-playing-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      padding: 12px 20px;
      display: none;
      align-items: center;
      gap: 12px;
      z-index: 100;
    }
    .now-playing-bar.show { display: flex; }
    .np-thumb {
      width: 40px; height: 40px;
      border-radius: 8px;
      object-fit: cover;
      background: var(--surface2);
      flex-shrink: 0;
    }
    .np-info { flex: 1; min-width: 0; }
    .np-title {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .np-playing {
      font-size: 11px;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 2px;
    }
    .np-dots span {
      display: inline-block;
      width: 3px; height: 10px;
      background: var(--accent);
      border-radius: 2px;
      margin: 0 1px;
      animation: bar 1s ease-in-out infinite;
    }
    .np-dots span:nth-child(2) { animation-delay: 0.2s; }
    .np-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bar {
      0%, 100% { transform: scaleY(0.4); }
      50% { transform: scaleY(1); }
    }
    .np-play-btn {
      background: var(--accent);
      border: none;
      width: 36px; height: 36px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .np-play-btn svg { width: 16px; height: 16px; color: #0a0a0f; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">Id Muz<span>ix</span><span class="logo-dot"></span></div>
  </header>

  <!-- Search -->
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Cari lagu, artis..." autocomplete="off" />
    <button class="search-btn" id="searchBtn" title="Cari">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
    </button>
  </div>

  <!-- History -->
  <div id="historySection" style="display:none">
    <div class="history-label">Pencarian terakhir</div>
    <div class="history-chips" id="historyChips"></div>
  </div>

  <!-- Error / empty state -->
  <div class="state-msg" id="errorMsg">
    <div class="emoji">😔</div>
    <strong>Lagu gak ditemukan</strong>
    Coba keyword yang lebih spesifik
  </div>

  <!-- Result card -->
  <div class="result-card" id="resultCard">
    <div id="thumbWrap">
      <div class="thumb-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 18V5l12-2v13M9 18c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm12 0c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2z"/>
        </svg>
      </div>
    </div>

    <div class="card-info">
      <div class="card-title" id="cardTitle">—</div>
      <div class="card-meta" id="cardMeta">—</div>
    </div>

    <div class="player">
      <!-- Progress -->
      <div class="progress-wrap">
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="time-row">
          <span id="timeCurrent">0:00</span>
          <span id="timeDuration">0:00</span>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <!-- Volume -->
        <button class="ctrl-btn" id="muteBtn" title="Mute">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path id="volPath" d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
        </button>

        <!-- Play/Pause -->
        <button class="play-btn" id="playBtn" disabled>
          <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
        </button>

        <!-- Loop -->
        <button class="ctrl-btn" id="loopBtn" title="Loop">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Download -->
    <a class="download-btn" id="downloadBtn" href="#" download>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Download MP3
    </a>
  </div>
</div>

<!-- Now Playing Bar -->
<div class="now-playing-bar" id="nowPlayingBar">
  <img class="np-thumb" id="npThumb" src="" alt="" />
  <div class="np-info">
    <div class="np-title" id="npTitle">—</div>
    <div class="np-playing">
      <div class="np-dots">
        <span></span><span></span><span></span>
      </div>
      Playing
    </div>
  </div>
  <button class="np-play-btn" id="npPlayBtn">
    <svg id="npPlayIcon" viewBox="0 0 24 24" fill="currentColor">
      <polygon points="5 3 19 12 5 21 5 3"/>
    </svg>
  </button>
</div>

<!-- Hidden audio element -->
<audio id="audioEl" preload="none"></audio>

<script>
  const BACKEND = 'https://xkhfnxgmsffn.ap-southeast-1.clawcloudrun.com';

  const audio = document.getElementById('audioEl');
  const searchInput = document.getElementById('searchInput');
  const searchBtn = document.getElementById('searchBtn');
  const resultCard = document.getElementById('resultCard');
  const errorMsg = document.getElementById('errorMsg');
  const cardTitle = document.getElementById('cardTitle');
  const cardMeta = document.getElementById('cardMeta');
  const thumbWrap = document.getElementById('thumbWrap');
  const playBtn = document.getElementById('playBtn');
  const playIcon = document.getElementById('playIcon');
  const progressFill = document.getElementById('progressFill');
  const progressBar = document.getElementById('progressBar');
  const timeCurrent = document.getElementById('timeCurrent');
  const timeDuration = document.getElementById('timeDuration');
  const downloadBtn = document.getElementById('downloadBtn');
  const muteBtn = document.getElementById('muteBtn');
  const loopBtn = document.getElementById('loopBtn');
  const nowPlayingBar = document.getElementById('nowPlayingBar');
  const npThumb = document.getElementById('npThumb');
  const npTitle = document.getElementById('npTitle');
  const npPlayBtn = document.getElementById('npPlayBtn');
  const npPlayIcon = document.getElementById('npPlayIcon');
  const historySection = document.getElementById('historySection');
  const historyChips = document.getElementById('historyChips');

  let currentToken = null;
  let isLooping = false;
  let isMuted = false;
  let currentThumb = '';
  let currentTitle = '';

  // ─── History ────────────────────────────────────────────────────────────────
  function getHistory() {
    try { return JSON.parse(localStorage.getItem('muzix_history') || '[]'); } catch { return []; }
  }
  function addHistory(q) {
    let h = getHistory().filter(x => x !== q);
    h.unshift(q);
    h = h.slice(0, 6);
    localStorage.setItem('muzix_history', JSON.stringify(h));
    renderHistory();
  }
  function renderHistory() {
    const h = getHistory();
    if (!h.length) { historySection.style.display = 'none'; return; }
    historySection.style.display = 'block';
    historyChips.innerHTML = h.map(q =>
      `<div class="chip" onclick="searchQuery('${q.replace(/'/g,"\\'")}')">🎵 ${q}</div>`
    ).join('');
  }
  renderHistory();

  // ─── Search ─────────────────────────────────────────────────────────────────
  async function searchQuery(q) {
    q = q || searchInput.value.trim();
    if (!q) return;
    searchInput.value = q;

    searchBtn.classList.add('loading');
    searchBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>`;

    resultCard.classList.remove('show');
    errorMsg.classList.remove('show');

    try {
      const res = await fetch(`${BACKEND}/search?q=${encodeURIComponent(q)}`);
      const data = await res.json();

      if (!res.ok || data.error) throw new Error(data.error || 'Gagal');

      // Set thumbnail
      thumbWrap.innerHTML = data.thumbnail
        ? `<img class="card-thumb" src="${data.thumbnail}" alt="${data.title}" onerror="this.style.display='none'">`
        : `<div class="thumb-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13M9 18c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm12 0c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2z"/></svg></div>`;

      cardTitle.textContent = data.title;
      cardMeta.textContent = formatDuration(data.duration);
      currentToken = data.stream_token;
      currentThumb = data.thumbnail || '';
      currentTitle = data.title;

      // Setup audio
      audio.src = `${BACKEND}/stream/${currentToken}`;
      audio.load();
      playBtn.disabled = false;

      // Download link
      downloadBtn.href = `${BACKEND}/download/${currentToken}`;
      downloadBtn.download = `${data.title}.mp3`;

      // Now playing bar
      npThumb.src = currentThumb;
      npTitle.textContent = currentTitle;

      resultCard.classList.add('show');
      addHistory(q);

      // MediaSession API
      if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({
          title: data.title,
          artwork: currentThumb ? [{ src: currentThumb, sizes: '600x600', type: 'image/jpeg' }] : []
        });
        navigator.mediaSession.setActionHandler('play', () => togglePlay());
        navigator.mediaSession.setActionHandler('pause', () => togglePlay());
      }

    } catch (err) {
      console.error(err);
      errorMsg.classList.add('show');
    }

    searchBtn.classList.remove('loading');
    searchBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>`;
  }

  // ─── Player Controls ─────────────────────────────────────────────────────────
  function togglePlay() {
    if (audio.paused) {
      audio.play();
    } else {
      audio.pause();
    }
  }

  function updatePlayIcons(playing) {
    const playingSVG = `<svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`;
    const pausedSVG = `<svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
    playBtn.innerHTML = playing ? playingSVG : pausedSVG;
    npPlayBtn.innerHTML = playing ? playingSVG.replace('id="playIcon"','id="npPlayIcon"') : pausedSVG.replace('id="playIcon"','id="npPlayIcon"');
  }

  audio.addEventListener('play', () => {
    updatePlayIcons(true);
    nowPlayingBar.classList.add('show');
    if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
  });

  audio.addEventListener('pause', () => {
    updatePlayIcons(false);
    if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
  });

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    progressFill.style.width = pct + '%';
    timeCurrent.textContent = formatTime(audio.currentTime);
    timeDuration.textContent = formatTime(audio.duration);
  });

  audio.addEventListener('ended', () => {
    if (isLooping) { audio.currentTime = 0; audio.play(); }
  });

  // Seekbar click
  progressBar.addEventListener('click', (e) => {
    if (!audio.duration) return;
    const rect = progressBar.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
  });

  playBtn.addEventListener('click', togglePlay);
  npPlayBtn.addEventListener('click', togglePlay);

  // Mute
  muteBtn.addEventListener('click', () => {
    isMuted = !isMuted;
    audio.muted = isMuted;
    muteBtn.style.color = isMuted ? 'var(--accent)' : '';
  });

  // Loop
  loopBtn.addEventListener('click', () => {
    isLooping = !isLooping;
    audio.loop = isLooping;
    loopBtn.style.color = isLooping ? 'var(--accent)' : '';
  });

  // Search events
  searchBtn.addEventListener('click', () => searchQuery());
  searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') searchQuery();
  });

  // ─── Utils ───────────────────────────────────────────────────────────────────
  function formatTime(s) {
    if (isNaN(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2, '0')}`;
  }

  function formatDuration(ms) {
    if (!ms) return '';
    const total = Math.floor(ms / 1000);
    const m = Math.floor(total / 60);
    const s = total % 60;
    return `${m}:${s.toString().padStart(2, '0')}`;
  }
</script>
</body>
</html>
