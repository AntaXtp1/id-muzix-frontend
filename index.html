<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Id Muzix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="preconnect" href="https://cf-media.sndcdn.com" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="container">
  <header>
    <div class="logo">Id Muz<span>ix</span><span class="logo-dot"></span></div>
  </header>

  <!-- Search -->
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Cari lagu, artis..." autocomplete="off" />
    <button class="search-btn" id="searchBtn" title="Cari">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
    </button>
  </div>

  <!-- History -->
  <div id="historySection" style="display:none">
    <div class="history-label">Pencarian terakhir</div>
    <div class="history-chips" id="historyChips"></div>
  </div>

  <!-- Error state -->
  <div class="state-msg" id="errorMsg">
    <div class="emoji">😔</div>
    <strong>Lagu gak ditemukan</strong>
    Coba keyword yang lebih spesifik
  </div>

  <!-- Result card -->
  <div class="result-card" id="resultCard">
    <div id="thumbWrap">
      <div class="thumb-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 18V5l12-2v13M9 18c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm12 0c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2z"/>
        </svg>
      </div>
    </div>

    <div class="card-info">
      <div class="card-title" id="cardTitle">—</div>
      <div class="card-meta" id="cardMeta">—</div>
    </div>

    <div class="player">
      <div class="progress-wrap">
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="time-row">
          <span id="timeCurrent">0:00</span>
          <span id="timeDuration">0:00</span>
        </div>
      </div>

      <div class="controls">
        <button class="ctrl-btn" id="muteBtn" title="Mute">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
        </button>
        <button class="play-btn" id="playBtn" disabled>
          <svg viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
        </button>
        <button class="ctrl-btn" id="loopBtn" title="Loop">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
            <path d="M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
          </svg>
        </button>
      </div>
    </div>

    <a class="download-btn" id="downloadBtn" href="#" download>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Download MP3
    </a>
  </div>
</div>

<!-- Now Playing Bar -->
<div class="now-playing-bar" id="nowPlayingBar">
  <img class="np-thumb" id="npThumb" src="" alt="" />
  <div class="np-info">
    <div class="np-title" id="npTitle">—</div>
    <div class="np-playing">
      <div class="np-dots"><span></span><span></span><span></span></div>
      Playing
    </div>
  </div>
  <button class="np-play-btn" id="npPlayBtn">
    <svg viewBox="0 0 24 24" fill="currentColor">
      <polygon points="5 3 19 12 5 21 5 3"/>
    </svg>
  </button>
</div>

<audio id="audioEl" preload="none"></audio>
<script src="js/app.js"></script>
</body>
</html>
